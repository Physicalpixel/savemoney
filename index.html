<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Daily, Gain Yearly: A Savings Forecast by Age</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }
    .inputs {
      display: flex;
      gap: 16px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 13px;
      color: #666;
    }
    input[type=number] {
      width: 150px;
      padding: 8px 12px;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=number]:focus {
      border-color: #888;
    }
    .table-scroll {
      overflow-x: auto;
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid #ddd;
    }
    table {
      border-collapse: collapse;
      font-size: 14px;
      width: 100%;
      table-layout: fixed;
    }
    thead th {
      background: #f5f5f3;
      color: #888;
      font-size: 12px;
      font-weight: 500;
      padding: 10px 16px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 0.5px solid #ddd;
    }
    thead th:nth-child(1) { width: 120px; }
    thead th:nth-child(2) { width: 60px; }
    thead th:nth-child(3) { width: 130px; }
    thead th:nth-child(4) { width: auto; }
    tbody td {
      padding: 10px 16px;
      border-bottom: 0.5px solid #eee;
      white-space: nowrap;
      color: #1a1a1a;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody td.year-cell {
      background: #eef3fb;
      color: #1a5fa5;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      width: 120px;
    }
    tbody tr:nth-child(even) td:not(.year-cell) {
      background: #fafaf8;
    }
  </style>
</head>
<body>
  <h1>Save Daily, Gain Yearly: A Savings Forecast by Age</h1>
  <div class="inputs">
    <div class="field">
      <label>Current age</label>
      <input type="number" id="age" value="12" min="0" max="100" />
    </div>
    <div class="field">
      <label>Daily amount ($)</label>
      <input type="number" id="amount" value="10" min="0" step="0.01" />
    </div>
  </div>
  <div class="table-scroll">
    <table id="main-table"></table>
  </div>

  <script>
    function render() {
      const age = parseInt(document.getElementById('age').value) || 0;
      const amount = parseFloat(document.getElementById('amount').value) || 0;

      let html = `<thead><tr>
        <th>Savings at the end of</th>
        <th>Age</th>
        <th>Total saved</th>
        <th>Calculation</th>
      </tr></thead><tbody>`;

      for (let y = 1; y <= 15; y++) {
        const futureAge = age + y;
        const total = (amount * 365 * y).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        html += `<tr>
          <td class="year-cell">Year ${y}</td>
          <td>${futureAge}</td>
          <td>$${total}</td>
          <td style="color:#999; font-size:13px;">$${amount.toFixed(2)} × 365 × ${y}</td>
        </tr>`;
      }

      html += '</tbody>';
      document.getElementById('main-table').innerHTML = html;
    }

    document.getElementById('age').addEventListener('input', render);
    document.getElementById('amount').addEventListener('input', render);
    render();
  </script>
</body>
</html>
